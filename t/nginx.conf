worker_processes 1;
daemon off;
error_log logs/error.log info;
pid logs/nginx.pid;

load_module modules/ngx_http_htaccess_module.so;

events {
    worker_connections 64;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    access_log logs/access.log;

    server {
        listen 8181;
        server_name localhost;

        # Test document root
        root __HTDOCS_ROOT__;

        # Enable htaccess for all locations by default
        location / {
            htaccess on;
        }

        # Disable htaccess for this location (control group)
        location /no-htaccess/ {
            htaccess off;
        }
    }
}
