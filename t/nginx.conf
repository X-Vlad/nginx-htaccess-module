worker_processes 1;
daemon off;
error_log logs/error.log info;
pid logs/nginx.pid;

load_module modules/ngx_http_htaccess_module.so;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    access_log logs/access.log;

    server {
        listen 8181;
        server_name localhost;

        # Test document root
        root __HTDOCS_ROOT__;

        # Enable htaccess for all locations by default
        location / {
            htaccess on;
        }

        # SSLRequireSSL behind a TLS-terminating proxy: X-Forwarded-Proto is
        # only trusted when htaccess_trust_proxy is explicitly enabled.
        location ^~ /ssl-required/ {
            htaccess on;
            htaccess_trust_proxy on;
        }

        # Same SSLRequireSSL dir, but WITHOUT trust_proxy: X-Forwarded-Proto
        # must be ignored (secure default), so https spoofing is rejected.
        location ^~ /ssl-untrusted/ {
            htaccess on;
            alias __HTDOCS_ROOT__/ssl-required/;
        }

        # Test endpoint: echoes the collected $htaccess_php_value /
        # $htaccess_php_admin_value into the response body so the test
        # harness can verify them (HTTP response headers can't carry
        # the embedded newlines that PHP_VALUE uses as a separator).
        location ~ "^/(.+)/__pv$" {
            htaccess on;
            default_type text/plain;
            return 200 "PV<<$htaccess_php_value>>\nPAV<<$htaccess_php_admin_value>>\n";
        }

        # Test setup for SetEnv / SetEnvIf / BrowserMatch tests.
        # Variables are declared with `set` so add_header can reference them;
        # our htaccess handler runs after the rewrite script and overwrites
        # them when SetEnvIf/SetEnv matches. Static file is served, so the
        # rewrite script (set steps only) doesn't short-circuit our handler.
        location ^~ /setenv/ {
            htaccess on;
            set $is_bot      "";
            set $is_bot_nc   "";
            set $is_moz      "";
            set $is_moz_nc   "";
            set $site_flavor "";
            add_header X-Is-Bot       $is_bot       always;
            add_header X-Is-Bot-Nc    $is_bot_nc    always;
            add_header X-Is-Moz       $is_moz       always;
            add_header X-Is-Moz-Nc    $is_moz_nc    always;
            add_header X-Site-Flavor  $site_flavor  always;
        }

        # Test endpoint: dumps request-header values after RequestHeader
        # directives have run. Uses $http_<name> built-ins so nginx reads
        # the headers from the mutated r->headers_in list.
        location ~ "^/(.+)/__req$" {
            htaccess on;
            default_type text/plain;
            return 200
              "INJECTED=[$http_x_injected] XFWD=[$http_x_forwarded_proto] DROPME=[$http_x_drop_me] MULTI=[$http_x_multi] UA=[$http_user_agent]\n";
        }

        # Directory-listing tests: autoindex is ON here so that "Options
        # -Indexes" enforcement is observable (without our fix the listing
        # would be served).
        location ^~ /sec/listing/ {
            htaccess on;
            autoindex on;
        }

        # Conditional Header (env=) test: the env var must be declared so
        # SetEnvIf can populate it and the header filter can read it back.
        location ^~ /sec/cors/ {
            htaccess on;
            set $cors_ok "";
        }

        # Disable htaccess for this location (control group)
        location /no-htaccess/ {
            htaccess off;
        }
    }
}
